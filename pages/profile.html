<section class="relative min-h-screen overflow-hidden bg-background text-text flex items-center">
    <div class="absolute top-0 left-1/2 -translate-x-1/2 h-[600px] w-[600px] rounded-full bg-accent opacity-10 blur-[180px]">
    </div>
    <div class="absolute inset-0 opacity-[0.03]"
        style="
            background-image:
                linear-gradient(rgba(255,255,255,.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,.08) 1px, transparent 1px);
            background-size:48px 48px;">
    </div>

    <div class="container mx-auto px-6 relative z-10">
        <div class="grid lg:grid-cols-2 gap-20 items-center">
            <!-- LEFT -->
            <div>
                <span class="inline-flex items-center gap-2 rounded-full border border-border bg-surface px-4 py-2 text-sm text-subtext">
                    <span class="h-2 w-2 rounded-full bg-green-400"></span>
                    <span data-i18n="hero.badge"></span>
                </span>

                <h1 class="mt-8 text-5xl md:text-7xl font-black leading-tight">
                    <span data-i18n="hero.greeting"></span>
                    <span class="bg-gradient-to-r from-accent to-accent2 bg-clip-text text-transparent"
                        data-i18n="hero.name"></span>
                </h1>

                <h2 class="mt-6 text-2xl md:text-4xl font-semibold text-subtext"
                    data-i18n="hero.job">
                </h2>

                <p
                    class="mt-8 max-w-xl leading-8 text-subtext"
                    data-i18n="hero.description">
                </p>

                <div class="mt-10 flex gap-4">
                    <a href="#projects"
                        class="rounded-xl bg-accent px-6 py-4 text-white font-semibold transition hover:-translate-y-1">
                        <span data-i18n="hero.buttons.project"></span>
                    </a>
                    <a href="#contact"
                        class="rounded-xl border border-border bg-surface px-6 py-4 font-semibold transition hover:border-accent">
                        <span data-i18n="hero.buttons.contact"></span>
                    </a>
                </div>

                <div class="grid grid-cols-3 gap-8 mt-16 border-t border-border pt-8">
                    <div>
                        <h3 class="text-3xl font-bold"
                            data-i18n="hero.stats.0.value">
                        </h3>
                        <p class="mt-2 text-sm text-subtext"
                            data-i18n="hero.stats.0.label">
                        </p>
                    </div>
                    <div>
                        <h3 class="text-3xl font-bold"
                            data-i18n="hero.stats.1.value">
                        </h3>
                        <p class="mt-2 text-sm text-subtext"
                            data-i18n="hero.stats.1.label">
                        </p>
                    </div>
                    <div>
                        <h3 class="text-3xl font-bold"
                            data-i18n="hero.stats.2.value">
                        </h3>
                        <p class="mt-2 text-sm text-subtext"
                            data-i18n="hero.stats.2.label">
                        </p>
                    </div>
                </div>
            </div>

            <!-- RIGHT -->
            <div class="hidden lg:flex justify-center">
                <div class="relative w-[460px] rounded-3xl border border-border bg-surface p-5 shadow-xl">
                    <div class="flex gap-2 mb-5">
                        <span class="w-3 h-3 rounded-full bg-red-500"></span>
                        <span class="w-3 h-3 rounded-full bg-yellow-500"></span>
                        <span class="w-3 h-3 rounded-full bg-green-500"></span>
                    </div>

                    <div class="space-y-4">
                        <div class="font-mono text-sm md:text-base leading-relaxed text-subtext px-2">
                            <div><span class="text-gray-400">&lt;</span><span class="text-pink-500">div</span> <span class="text-blue-400">id</span><span class="text-gray-400">=</span><span class="text-green-400">"hero"</span><span class="text-gray-400">&gt;</span></div>
                            <div class="pl-6"><span class="text-gray-400">&lt;</span><span class="text-pink-500">h1</span><span class="text-gray-400">&gt;</span><span class="text-text">Hello, World!</span><span class="text-gray-400">&lt;/</span><span class="text-pink-500">h1</span><span class="text-gray-400">&gt;</span></div>
                            <div class="pl-6"><span class="text-gray-400">&lt;</span><span class="text-pink-500">p</span><span class="text-gray-400">&gt;</span><span class="text-text">Turning coffee into code...</span><span class="text-gray-400">&lt;/</span><span class="text-pink-500">p</span><span class="text-gray-400">&gt;</span></div>
                            <div><span class="text-gray-400">&lt;/</span><span class="text-pink-500">div</span><span class="text-gray-400">&gt;</span></div>
                        </div>

                        <div class="rounded-xl bg-background p-6 mt-8 border border-border">
                            <p class="font-mono text-green-500 font-semibold">
                                &lt;Developer /&gt;
                            </p>
                            <p class="mt-4 text-subtext"
                                data-i18n="hero.codeText">
                                </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
