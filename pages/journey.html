<section id="journey" class="relative overflow-hidden py-24 md:py-16 bg-background">

    <!-- Background Glow -->
    <div class="absolute left-0 top-40 h-96 w-96 rounded-full bg-accent opacity-5 blur-[170px]"></div>
    <div class="absolute right-0 bottom-20 h-80 w-80 rounded-full bg-accent2 opacity-5 blur-[150px]"></div>

    <div class="relative container mx-auto px-6">

        <!-- Heading -->
        <div class="mx-auto max-w-3xl text-center">

            <p
                class="font-semibold uppercase tracking-[0.25em] text-accent"
                data-i18n="journey.title">
            </p>

            <h1
                class="mt-4 text-3xl font-black leading-tight text-text md:text-5xl"
                data-i18n="journey.subtitle">
            </h1>

            <p
                class="mx-auto mt-8 max-w-3xl text-lg leading-8 text-subtext"
                data-i18n="journey.description">
            </p>

        </div>

        <!-- Quote -->

        <div
            class="mx-auto mt-16 max-w-4xl rounded-3xl border border-border bg-surface p-10 text-center shadow-lg">

            <p
                class="text-xl italic leading-9 text-text md:text-2xl"
                data-i18n="journey.quote">
            </p>

        </div>

        <!-- Journey Timeline -->

        <div class="mt-24">

            <div
                class="mb-10 flex items-center justify-between">

                <div>

                    <h2
                        class="text-3xl font-black text-text"
                        data-i18n="journey.travel_title">
                    </h2>

                    <p
                        class="mt-3 text-subtext"
                        data-i18n="journey.travel_description">
                    </p>

                </div>

            </div>

            <div
                id="journey-container"
                class="grid gap-8 md:grid-cols-2 xl:grid-cols-3">

                <!-- Render JS -->

            </div>

        </div>

        <!-- Lessons -->

        <div class="mt-28">

            <h2
                class="text-center text-3xl font-black text-text"
                data-i18n="journey.lessons_title">
            </h2>

            <div
                class="mt-12 grid gap-6 md:grid-cols-3">

                <div
                    class="rounded-3xl border border-border bg-surface p-8">

                    <div class="text-3xl">🌍</div>

                    <h3
                        class="mt-5 text-xl font-bold text-text"
                        data-i18n="journey.lessons.0.title">
                    </h3>

                    <p
                        class="mt-4 leading-7 text-subtext"
                        data-i18n="journey.lessons.0.description">
                    </p>

                </div>

                <div
                    class="rounded-3xl border border-border bg-surface p-8">

                    <div class="text-3xl">🏕️</div>

                    <h3
                        class="mt-5 text-xl font-bold text-text"
                        data-i18n="journey.lessons.1.title">
                    </h3>

                    <p
                        class="mt-4 leading-7 text-subtext"
                        data-i18n="journey.lessons.1.description">
                    </p>

                </div>

                <div
                    class="rounded-3xl border border-border bg-surface p-8">

                    <div class="text-3xl">💡</div>

                    <h3
                        class="mt-5 text-xl font-bold text-text"
                        data-i18n="journey.lessons.2.title">
                    </h3>

                    <p
                        class="mt-4 leading-7 text-subtext"
                        data-i18n="journey.lessons.2.description">
                    </p>

                </div>

            </div>

        </div>

    </div>

</section>
<div id="journey-modal-container"></div>
