<style>
    @keyframes customWave {
        0%, 100% { transform: scale(1); }
        35% { transform: scale(1.08); }
        45% { transform: scale(0.95); }
        55% { transform: scale(1.15); }
        65% { transform: scale(0.95); }
        80% { transform: scale(1.03); }
    }

    @keyframes rippleAura {
        0% {
            transform: scale(1);
            opacity: 0.6; 
        }
        80% {
            transform: scale(1.6); 
            opacity: 0;
        }
        100% {
            transform: scale(1.6);
            opacity: 0;
        }
    }

    .animate-custom-pulse {
        position: relative; 
        animation: customWave 7s ease-in-out infinite;
    }

    .animate-custom-pulse::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: inherit; 
        border-radius: 50%; 
        z-index: -1; 
        
        animation: rippleAura 7s ease-out infinite;
        
        animation-delay: 3s; 
    }
</style>
