<div
    id="project-modal"
    class="fixed inset-0 z-[999] hidden items-center justify-center bg-black/60 p-6 backdrop-blur-sm">
    
    <div
        id="project-modal-overlay"
        class="absolute inset-0">
    </div>
    
    <div
        id="project-modal-content"
        class="relative max-h-[92vh] w-full max-w-5xl overflow-hidden rounded-[32px] border border-border bg-surface shadow-2xl transition duration-300">
        
        <button
            id="close-project-modal"
            class="absolute right-6 top-6 z-20 flex h-11 w-11 items-center justify-center rounded-full border border-border bg-white/80 text-xl backdrop-blur transition hover:bg-background">
            ✕
        </button>

        <div class="max-h-[92vh] overflow-y-auto custom-scrollbar">
            
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-0">
                
                <div class="p-6 md:p-8 lg:p-10 lg:col-span-7 lg:border-r border-border">
                    <div class="relative overflow-hidden rounded-2xl border border-border/50">
                        <img
                            id="modal-image"
                            src=""
                            class="aspect-video w-full object-cover"
                            alt="Project Thumbnail">
                    </div>
                    
                    <div class="mt-6">
                        <span
                            id="modal-category"
                            class="inline-flex rounded-full bg-accent/10 px-4 py-2 text-sm font-semibold text-accent">
                        </span>
                        <h2
                            id="modal-title"
                            class="mt-4 text-3xl md:text-4xl font-black text-text leading-tight">
                        </h2>
                        <p
                            id="modal-company"
                            class="mt-2 text-lg font-medium text-accent">
                        </p>
                        <p
                            id="modal-description"
                            class="mt-6 leading-8 text-subtext text-justify lg:text-left">
                        </p>
                    </div>
                </div>

                <div class="p-6 md:p-8 lg:p-10 lg:col-span-5 flex flex-col justify-between space-y-10 bg-background/30">
                    
                    <div class="space-y-10">
                        <div>
                            <h3 class="text-lg font-bold text-text" data-i18n="projects.modal.tech_stack">
                                Tech Stack
                            </h3>
                            <div
                                id="modal-tech"
                                class="mt-4 flex flex-wrap gap-3">
                            </div>
                        </div>
                        
                        <div>
                            <h3 class="text-lg font-bold text-text" data-i18n="projects.modal.key_features">
                                Key Features
                            </h3>
                            <div
                                id="modal-features"
                                class="mt-4 space-y-3">
                            </div>
                        </div>
                        
                        <div>
                            <h3 class="text-lg font-bold text-text" data-i18n="projects.modal.responsibilities">
                                Responsibilities
                            </h3>
                            <div
                                id="modal-responsibilities"
                                class="mt-4 space-y-3">
                            </div>
                        </div>
                    </div>

                    <div class="pt-6 flex flex-wrap gap-4 border-t border-border/60">
                        <a
                            id="modal-live"
                            target="_blank"
                            class="flex-1 text-center rounded-xl bg-accent px-6 py-4 font-semibold text-white transition hover:-translate-y-1 cursor-pointer">
                            Live Website
                        </a>

                        <a
                            id="modal-github"
                            target="_blank"
                            class="flex-1 text-center rounded-xl border border-border bg-background px-6 py-4 font-semibold transition hover:border-accent cursor-pointer"
                            data-i18n="projects.modal.github">
                            GitHub
                        </a>
                    </div>
                    
                </div> </div> </div> </div> </div>
