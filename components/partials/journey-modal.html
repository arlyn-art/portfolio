<div
    id="journey-modal"
    class="fixed inset-0 z-[999] hidden items-center justify-center bg-black/70 p-4 backdrop-blur-sm">
    <div
        id="journey-modal-overlay"
        class="absolute inset-0">
    </div>
    <div
        class="relative z-10 flex max-h-[92vh] w-full max-w-7xl flex-col overflow-hidden rounded-[32px] border border-border bg-surface shadow-2xl lg:flex-row">
        <button
            id="close-journey-modal"
            class="absolute right-5 top-5 z-20 flex h-11 w-11 items-center justify-center rounded-full border border-border bg-background transition hover:border-accent hover:text-accent">
            <i class="fa-solid fa-xmark"></i>
        </button>
        <div
            class="flex w-full flex-col border-b border-border bg-background lg:w-[38%] lg:border-b-0 lg:border-r">
            <div class="overflow-hidden">

                <img
                    id="journey-cover"
                    src=""
                    class="aspect-[4/3] w-full object-cover transition duration-300">
            </div>
            <div class="flex-1 overflow-y-auto p-6">
                <div class="mb-5 flex items-center justify-between">
                    <h3
                        class="text-lg font-bold text-text"
                        data-i18n="journey.modal.gallery">
                    </h3>
                    <span
                        id="journey-gallery-count"
                        class="rounded-full border border-border bg-surface px-3 py-1 text-xs text-subtext">
                    </span>
                </div>
                <div
                    id="journey-gallery"
                    class="grid grid-cols-2 gap-3">
                </div>
            </div>
        </div>

        <div
            class="flex-1 overflow-y-auto">
            <div
                class="space-y-10 p-8 lg:p-10">
                <div>
                    <div
                        class="flex flex-wrap items-center gap-3">
                        <span
                            id="journey-year"
                            class="rounded-full bg-accent/10 px-4 py-2 text-sm font-semibold text-accent">
                        </span>
                        <span
                            id="journey-location"
                            class="rounded-full border border-border bg-background px-4 py-2 text-sm">
                        </span>

                    </div>
                    <h2
                        id="journey-title"
                        class="mt-6 text-4xl font-black text-text">
                    </h2>
                </div>
                <div>
                    <h3
                        class="text-xl font-bold text-text"
                        data-i18n="journey.modal.story">
                    </h3>
                    <p
                        id="journey-story"
                        class="mt-5 leading-8 text-subtext">
                    </p>
                </div>
                <div>
                    <h3
                        class="text-xl font-bold text-text"
                        data-i18n="journey.modal.destinations">
                    </h3>
                    <div
                        id="journey-info"
                        class="mt-6 grid gap-4 sm:grid-cols-2">
                    </div>
                </div>
                <div>
                    <h3
                        class="text-xl font-bold text-text"
                        data-i18n="journey.modal.highlights">
                    </h3>

                    <div
                        id="journey-highlights"
                        class="mt-5 space-y-4">
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
