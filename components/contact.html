<section id="contact" class="py-20 bg-surface/30">
    <div class="container mx-auto px-6 max-w-4xl">
        <div class="text-center mx-auto max-w-2xl mb-12">
            <p class="font-semibold uppercase tracking-[0.25em] text-accent" data-i18n="contact.title">Contact</p>
            <h2 class="mt-4 text-3xl font-black text-text md:text-4xl" data-i18n="contact.subtitle">Let's Work Together</h2>
        </div>

        <form id="contact-form" class="space-y-6 bg-surface border border-border p-8 md:p-10 rounded-3xl shadow-xl">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-subtext mb-2" data-i18n="contact.label_name">Your Name</label>
                    <input type="text" name="name" required class="w-full rounded-xl border border-border bg-background px-5 py-4 text-text outline-none focus:border-accent transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-subtext mb-2" data-i18n="contact.label_email">Email Address</label>
                    <input type="email" name="email" required class="w-full rounded-xl border border-border bg-background px-5 py-4 text-text outline-none focus:border-accent transition">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-subtext mb-2" data-i18n="contact.label_subject">Subject</label>
                <input type="text" name="subject" required class="w-full rounded-xl border border-border bg-background px-5 py-4 text-text outline-none focus:border-accent transition">
            </div>

            <div>
                <label class="block text-sm font-medium text-subtext mb-2" data-i18n="contact.label_message">Message</label>
                <textarea name="message" rows="5" required class="w-full rounded-xl border border-border bg-background px-5 py-4 text-text outline-none focus:border-accent transition resize-none"></textarea>
            </div>

            <div id="form-status" class="hidden text-sm font-medium p-4 rounded-xl text-center transition-all duration-300"></div>

            <button type="submit" id="form-btn" class="w-full md:w-auto px-8 py-4 bg-accent text-white font-semibold rounded-xl transition hover:-translate-y-1 shadow-lg shadow-accent/20 cursor-pointer flex items-center justify-center gap-3">
                <span id="btn-text" data-i18n="contact.btn_send">Send Message</span>
                
                <svg id="btn-spinner" class="hidden animate-spin h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>
        </form>
    </div>
</section>
