<section id="projects" class="relative overflow-hidden py-12 bg-background">
    <div class="absolute left-1/2 top-0 h-[420px] w-[420px] -translate-x-1/2 rounded-full bg-accent opacity-5 blur-[140px]"></div>
    <div class="relative container mx-auto px-6">
        <div class="mx-auto max-w-3xl text-center">
            <p
                class="font-semibold uppercase tracking-[0.25em] text-accent"
                data-i18n="projects.title">
            </p>
            <h2
                class="mt-4 text-2xl font-black leading-tight text-text md:text-3xl"
                data-i18n="projects.subtitle">
            </h2>
            <p
                class="mx-auto mt-6 max-w-2xl text-lg leading-8 text-subtext"
                data-i18n="projects.description">
            </p>
        </div>
        <div class="mt-14 flex justify-center">
            <div
                class="inline-flex rounded-full border border-border bg-surface p-1 shadow-sm">
                <button
                    data-project="commercial"
                    class="project-tab rounded-full bg-accent px-5 py-3 text-sm font-medium text-white transition md:px-6"
                    data-i18n="projects.tabs.0">
                </button>
                <button
                    data-project="personal"
                    class="project-tab rounded-full px-5 py-3 text-sm font-medium text-subtext transition hover:text-text md:px-6"
                    data-i18n="projects.tabs.1">
                </button>
                <button
                    data-project="documentation"
                    class="project-tab rounded-full px-5 py-3 text-sm font-medium text-subtext transition hover:text-text md:px-6"
                    data-i18n="projects.tabs.2">
                </button>
            </div>
        </div>
        <div class="mt-8 text-center">
            <p
                class="mx-auto max-w-2xl leading-7 text-subtext"
                data-i18n="projects.note">
            </p>
        </div>
        <div
            id="projects-container"
            class="mt-14 grid gap-6 md:grid-cols-2">
            </div>
    </div>
</section>
